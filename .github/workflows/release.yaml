name: Release Charts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - 'utils/charts-inheritance.yaml'
      - 'utils/generate-children-charts.py'

jobs:
  release:
    if: github.repository == 'CASD-EU/helm-charts-interactive-services'
    # depending on default permission settings for your org (contents being read-only or read-write for workloads), you will have to add permissions
    # see: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Generate children charts
        run: |
          pip install pyyaml
          python3 utils/generate-children-charts.py
          if [[ `git status --porcelain` ]]; then
            git add -A
            git commit -m "chore(charts): regenerate child charts [skip ci]"
            git push
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.8.1

      - name: Install helm-docs
        run: |
          cd /tmp
          wget https://github.com/norwoodj/helm-docs/releases/download/v1.11.0/helm-docs_1.11.0_Linux_x86_64.tar.gz
          tar -xvf helm-docs_1.11.0_Linux_x86_64.tar.gz
          sudo mv helm-docs /usr/local/sbin

      - name: Generate Helm docs
        run: |
          helm-docs -o README.md
          if [[ `git status --porcelain` ]]; then
            git add -A
            git commit -m "docs(charts): regenerate helm docs [skip ci]"
            git push
          fi

      - name: Bootstrap gh-pages branch
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            exit 0
          fi

          worktree_dir="$(mktemp -d)"

          cleanup() {
            git worktree remove --force "$worktree_dir" || true
          }

          trap cleanup EXIT

          git worktree add --detach "$worktree_dir"
          git -C "$worktree_dir" checkout --orphan gh-pages
          git -C "$worktree_dir" rm -rf . >/dev/null 2>&1 || true
          touch "$worktree_dir/.nojekyll"
          git -C "$worktree_dir" add .nojekyll
          git -C "$worktree_dir" commit -m "chore(release): bootstrap gh-pages [skip ci]"
          git -C "$worktree_dir" push origin gh-pages

      - name: Package charts locally
        run: |
          set -euo pipefail

          package_dir=".cr-release-packages"
          staging_dir="$(mktemp -d)"

          cleanup() {
            rm -rf "$staging_dir"
          }

          trap cleanup EXIT

          rm -rf "$package_dir"
          mkdir -p "$package_dir"

          helm package charts/library-chart --destination "$package_dir"
          library_archive="$(printf '%s\n' "$package_dir"/library-chart-*.tgz)"

          for chart in charts/*; do
            if [[ ! -f "$chart/Chart.yaml" ]]; then
              continue
            fi

            if [[ "$chart" == "charts/library-chart" ]]; then
              continue
            fi

            staged_chart="$staging_dir/$(basename "$chart")"
            cp -a "$chart" "$staged_chart"

            if grep -q 'name: library-chart' "$chart/Chart.yaml"; then
              mkdir -p "$staged_chart/charts"
              rm -f "$staged_chart"/charts/library-chart-*.tgz
              cp "$library_archive" "$staged_chart/charts/"
            fi

            helm package "$staged_chart" --destination "$package_dir"
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          pages_branch: gh-pages
          skip_packaging: true
          skip_existing: true
          mark_as_latest: false
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
